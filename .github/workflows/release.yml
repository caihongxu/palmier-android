name: Release APK

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - name: Install dependencies and sync Capacitor
        run: |
          npm ci
          npx cap sync

      - name: Decode keystore
        run: echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 -d > android/palmier-release.keystore

      - name: Build release APK
        working-directory: android
        env:
          PALMIER_KEYSTORE_PATH: ${{ github.workspace }}/android/palmier-release.keystore
          PALMIER_KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          PALMIER_KEY_ALIAS: palmier
          PALMIER_KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: chmod +x gradlew && ./gradlew assembleRelease

      - name: Rename APK
        run: |
          mkdir -p artifacts
          cp android/app/build/outputs/apk/release/app-release.apk "artifacts/palmier-${GITHUB_REF_NAME}.apk"
          cp android/app/build/outputs/apk/release/app-release.apk artifacts/palmier.apk

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            artifacts/palmier-${{ github.ref_name }}.apk
            artifacts/palmier.apk
          generate_release_notes: true
